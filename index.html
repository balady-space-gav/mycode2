<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الشهادات الصحية - النسخة المستقرة الأصلية</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        
        :root {
            --balady-green: #0a8243;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 650px;
            margin-bottom: 20px;
        }

        .form-container h2 {
            color: var(--balady-green);
            margin-bottom: 20px;
            text-align: center;
            font-weight: 700;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 6px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .btn-submit {
            background-color: var(--balady-green);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
        }

        .preview-wrapper {
            display: none;
            width: 440px;
        }

        .card-page {
            background: #ffffff;
            width: 440px;
            height: 630px;
            padding: 25px 35px;
            position: relative;
            border: 1px solid #dcdcdc;
            margin-bottom: 20px;
        }

        .header-image-container {
            width: 100%;
            height: 70px;
            margin-bottom: 20px;
        }

        .header-uploaded-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .images-section {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .qr-photo, .user-photo {
            width: 110px;
            height: 110px;
        }

        .user-photo {
            object-fit: fill;
        }

        .title-badge {
            text-align: center;
            color: var(--balady-green);
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            border: 1.5px solid #000000;
        }

        .info-table td {
            padding: 6px;
        }

        .label-cell { font-weight: 700; text-align: right; width: 30%; }
        .colon-cell { text-align: center; width: 5%; }
        .value-cell { text-align: right; width: 65%; }

        .control-panel {
            display: none;
            width: 440px;
        }

        .btn-pdf {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="form-container" id="inputFormContainer">
        <h2>استمارة البيانات الأصلية</h2>
        <form id="certForm" onsubmit="processForm(event)">
            <div class="form-grid">
                <div class="form-group"><label>شعار الأمانة:</label><input type="file" id="inHeaderImg" accept="image/*" required></div>
                <div class="form-group"><label>الصورة الشخصية:</label><input type="file" id="inUserImg" accept="image/*" required></div>
                <div class="form-group"><label>رقم الشهادة:</label><input type="text" id="cNo" required></div>
                <div class="form-group"><label>مكان الإصدار:</label><input type="text" id="cPlace" required></div>
                <div class="form-group"><label>تاريخ الإصدار:</label><input type="text" id="cIssueDate" required></div>
                <div class="form-group"><label>نهاية الصلاحية:</label><input type="text" id="cExpiryDate" required></div>
                <div class="form-group full-width"><label>الاسم:</label><input type="text" id="cName" required></div>
                <div class="form-group"><label>رقم الهوية:</label><input type="text" id="cIdNo" required></div>
                <div class="form-group"><label>الجنس:</label><input type="text" id="cGender" required></div>
                <div class="form-group"><label>الجنسية:</label><input type="text" id="cNat" required></div>
                <div class="form-group"><label>المهنة:</label><input type="text" id="cJob" required></div>
                <div class="form-group"><label>البرنامج التثقيفي:</label><input type="text" id="cProg" required></div>
                <div class="form-group"><label>انتهاء البرنامج:</label><input type="text" id="cProgExp" required></div>
                <div class="form-group full-width"><label>اسم المنشأة:</label><input type="text" id="cFacName" required></div>
                <div class="form-group full-width"><label>رقم رخصة المنشأة:</label><input type="text" id="cFacLic" required></div>
            </div>
            <button type="submit" class="btn-submit">توليد الشهادة</button>
        </form>
    </div>

    <div class="preview-wrapper" id="previewWrapper">
        <div class="card-page" id="page1">
            <div class="header-image-container">
                <img id="outHeaderImg1" class="header-uploaded-img" src="">
            </div>
            <div class="images-section">
                <div id="outQrImg" class="qr-photo"></div>
                <img id="outUserImg1" class="user-photo" src="">
            </div>
            <div class="title-badge">شهادة صحية</div>
            <table class="info-table">
                <tr><td class="label-cell">رقم الشهادة</td><td class="colon-cell">:</td><td class="value-cell" id="lCertNo"></td></tr>
                <tr><td class="label-cell">مكان الإصدار</td><td class="colon-cell">:</td><td class="value-cell" id="lCertPlace"></td></tr>
                <tr><td class="label-cell">نهاية الصلاحية</td><td class="colon-cell">:</td><td class="value-cell" id="lExpiryDate"></td></tr>
                <tr><td class="label-cell">الاسم</td><td class="colon-cell">:</td><td class="value-cell" id="lName"></td></tr>
                <tr><td class="label-cell">رقم الهوية</td><td class="colon-cell">:</td><td class="value-cell" id="lIdNo"></td></tr>
                <tr><td class="label-cell">الجنس</td><td class="colon-cell">:</td><td class="value-cell" id="lGender"></td></tr>
                <tr><td class="label-cell">الجنسية</td><td class="colon-cell">:</td><td class="value-cell" id="lNat"></td></tr>
                <tr><td class="label-cell">المهنة</td><td class="colon-cell">:</td><td class="value-cell" id="lJob"></td></tr>
            </table>
        </div>
    </div>

    <div class="control-panel" id="controlPanel">
        <button class="btn-pdf" onclick="buildAbsolutePDF()">تحميل PDF</button>
    </div>

    <script>
        function processForm(event) {
            event.preventDefault();
            
            document.getElementById('lCertNo').innerText = document.getElementById('cNo').value;
            document.getElementById('lCertPlace').innerText = document.getElementById('cPlace').value;
            document.getElementById('lExpiryDate').innerText = document.getElementById('cExpiryDate').value;
            document.getElementById('lName').innerText = document.getElementById('cName').value;
            document.getElementById('lIdNo').innerText = document.getElementById('cIdNo').value;
            document.getElementById('lGender').innerText = document.getElementById('cGender').value;
            document.getElementById('lNat').innerText = document.getElementById('cNat').value;
            document.getElementById('lJob').innerText = document.getElementById('cJob').value;

            document.getElementById("outQrImg").innerHTML = "";
            new QRCode(document.getElementById("outQrImg"), {
                text: window.location.href,
                width: 110,
                height: 110
            });

            const headerFile = document.getElementById('inHeaderImg').files[0];
            const userFile = document.getElementById('inUserImg').files[0];

            if(headerFile) {
                const r1 = new FileReader();
                r1.onload = e => document.getElementById('outHeaderImg1').src = e.target.result;
                r1.readAsDataURL(headerFile);
            }
            if(userFile) {
                const r2 = new FileReader();
                r2.onload = e => document.getElementById('outUserImg1').src = e.target.result;
                r2.readAsDataURL(userFile);
            }

            document.getElementById('inputFormContainer').style.display = 'none';
            document.getElementById('previewWrapper').style.display = 'block';
            document.getElementById('controlPanel').style.display = 'block';
        }

        async function buildAbsolutePDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [116, 166] });
            const element = document.getElementById('page1');
            
            const canvas = await html2canvas(element, { scale: 3 });
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 116, 166);
            pdf.save('Certificate.pdf');
        }
    </script>
</body>
</html>
