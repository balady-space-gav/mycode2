<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الشهادات الصحية المطابق للأصل</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
 
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: #f5f7fa; padding: 20px; display: flex; justify-content: center; align-items: center; flex-direction: column; }

        /* نموذج الإدخال */
        .form-container { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 650px; margin-bottom: 20px; }
        .form-container h2 { color: #0a8243; margin-bottom: 20px; text-align: center; font-weight: 700; border-bottom: 2px solid #0a8243; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #cccccc; border-radius: 6px; font-size: 14px; }
        .btn-submit { background-color: #0a8243; color: white; border: none; padding: 14px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; margin-top: 15px; }

        /* منطقة البطاقة - مطابقة تماماً للصورة الأولى */
        .preview-wrapper { display: none; width: 440px; }
        .card-page { background: #ffffff; width: 440px; height: 630px; padding: 20px 30px; border: 1px solid #dcdcdc; margin-bottom: 20px; overflow: hidden; position: relative; }
        
        .header-image-container { width: 100%; height: 75px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; }
        .header-uploaded-img { width: 100%; height: 100%; object-fit: contain; }
        
        /* قسم الصور التناظري الأنيق */
        .images-section { display: flex; justify-content: center; margin-bottom: 5px; gap: 0px; align-items: center; }
        .user-photo { width: 110px; height: 110px; object-fit: cover; }
        .qr-photo { width: 110px; height: 110px; background: #ffffff; padding: 2px; display: flex; justify-content: center; align-items: center; }
        .qr-photo img { width: 100% !important; height: 100% !important; object-fit: contain; }
        
        .title-badge { text-align: center; color: #0a8243; font-size: 28px; font-weight: 800; margin-bottom: 15px; letter-spacing: 1px; }
        
        /* الجدول المطابق للصورة الأولى بدون حدود داخلية ضيقة وبإطار خارجي رمادي دائري الحواف */
        .info-box { border: 3px solid #b5b5b5; border-radius: 12px; padding: 15px 20px; background: #ffffff; }
        .info-table { width: 100%; border-collapse: collapse; font-size: 15px; }
        .info-table td { padding: 7px 0; vertical-align: middle; color: #000000; font-weight: 700; }
        .label-cell { text-align: right; width: 35%; font-size: 16px; font-weight: 700; }
        .value-cell { text-align: center; width: 65%; font-size: 16px; font-weight: 700; }
        .divider-row td { border-bottom: 2px solid #b5b5b5; padding-bottom: 10px; margin-bottom: 10px; }
        .divider-row + tr td { padding-top: 10px; }

        /* التحكم */
        .control-panel { display: none; width: 440px; margin-top: 10px; }
        .btn-pdf { background-color: #d32f2f; color: white; border: none; padding: 15px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-container" id="inputFormContainer">
        <h2>نظام طباعة الشهادات الصحية المطور</h2>
        <form id="certForm" onsubmit="processForm(event)">
            <div class="form-grid">
                <div class="form-group"><label>صورة الشعار (الهيدر):</label><input type="file" id="inHeaderImg" accept="image/*" required></div>
                <div class="form-group"><label>الصورة الشخصية للعامل:</label><input type="file" id="inUserImg" accept="image/*" required></div>
                <div class="form-group"><label>رقم الشهادة:</label><input type="text" id="cNo" placeholder="36803-1426" required></div>
                <div class="form-group"><label>مكان الإصدار:</label><input type="text" id="cPlace" placeholder="أمانة مدينة الرياض" required></div>
                <div class="form-group"><label>نهاية الصلاحية:</label><input type="text" id="cExpiryDate" placeholder="17/06/1448" required></div>
                <div class="form-group"><label>الاسم الكامل:</label><input type="text" id="cName" placeholder="معاذ احمد محسن" required></div>
                <div class="form-group"><label>رقم الهوية / الإقامة:</label><input type="text" id="cIdNo" placeholder="2179961053" required></div>
                <div class="form-group"><label>الجنس:</label><input type="text" id="cGender" placeholder="ذكر" required></div>
                <div class="form-group"><label>الجنسية:</label><input type="text" id="cNat" placeholder="اليمن" required></div>
                <div class="form-group"><label>المهنة:</label><input type="text" id="cJob" placeholder="عامل تحميل وتنزيل" required></div>
            </div>
            <button type="submit" class="btn-submit">توليد ومعاينة البطاقة المطابقة</button>
        </form>
    </div>

    <div class="preview-wrapper" id="previewWrapper">
        <div class="card-page" id="page1">
            <div class="header-image-container"><img id="outHeaderImg1" class="header-uploaded-img" src=""></div>
            <div class="images-section">
                <img id="outUserImg1" class="user-photo" src="">
                <div id="outQrImg" class="qr-photo"></div>
            </div>
            <div class="title-badge">شهادة صحية</div>
            
            <div class="info-box">
                <table class="info-table">
                    <tr><td class="value-cell" id="lCertNo"></td><td class="label-cell">رقم الشهادة</td></tr>
                    <tr><td class="value-cell" id="lCertPlace"></td><td class="label-cell">مكان الاصدار</td></tr>
                    <tr class="divider-row"><td class="value-cell" id="lExpiryDate"></td><td class="label-cell">نهاية الصلاحية</td></tr>
                    <tr><td class="value-cell" id="lName"></td><td class="label-cell">الاسم</td></tr>
                    <tr><td class="value-cell" id="lIdNo"></td><td class="label-cell">رقم الهوية</td></tr>
                    <tr><td class="value-cell" id="lGender"></td><td class="label-cell">الجنس</td></tr>
                    <tr><td class="value-cell" id="lNat"></td><td class="label-cell">الجنسية</td></tr>
                    <tr><td class="value-cell" id="lJob"></td><td class="label-cell">المهنة</td></tr>
                </table>
            </div>
        </div>
    </div>

    <div class="control-panel" id="controlPanel">
        <button class="btn-pdf" id="btnPdfSave" onclick="buildAbsolutePDF()">حفظ وتحميل الـ PDF النهائي</button>
    </div>

    <script>
        // تفكيك البيانات ورندرتها فوراً عند مسح الباركود
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('v');
            
            if (dataParam) {
                try {
                    const data = JSON.parse(decodeURIComponent(escape(atob(dataParam))));
                    
                    document.getElementById('inputFormContainer').style.display = 'none';
                    document.getElementById('previewWrapper').style.display = 'block';
                    document.getElementById('page1').style.display = 'block';
                    document.getElementById('controlPanel').style.display = 'none';

                    document.getElementById('lCertNo').innerText = data.cNo;
                    document.getElementById('lCertPlace').innerText = data.cPlace;
                    document.getElementById('lExpiryDate').innerText = data.cExpiryDate;
                    document.getElementById('lName').innerText = data.cName;
                    document.getElementById('lIdNo').innerText = data.cIdNo;
                    document.getElementById('lGender').innerText = data.cGender;
                    document.getElementById('lNat').innerText = data.cNat;
                    document.getElementById('lJob').innerText = data.cJob;
                    
                    if(data.hImg) document.getElementById('outHeaderImg1').src = data.hImg;
                    if(data.uImg) document.getElementById('outUserImg1').src = data.uImg;
                    
                    // توليد الباركود ليكون مطابقاً في العرض النهائي وثابت المربعات واسعاً ومفتوحاً
                    new QRCode(document.getElementById("outQrImg"), { 
                        text: window.location.href, 
                        width: 110, height: 110, 
                        correctLevel: QRCode.CorrectLevel.M 
                    });
                } catch (e) {
                    alert("خطأ في قراءة بيانات الباركود.");
                }
            }
        });

        function processForm(event) {
            event.preventDefault();
            
            const cNo = document.getElementById('cNo').value;
            const cPlace = document.getElementById('cPlace').value;
            const cExpiryDate = document.getElementById('cExpiryDate').value;
            const cName = document.getElementById('cName').value;
            const cIdNo = document.getElementById('cIdNo').value;
            const cGender = document.getElementById('cGender').value;
            const cNat = document.getElementById('cNat').value;
            const cJob = document.getElementById('cJob').value;

            document.getElementById('lCertNo').innerText = cNo;
            document.getElementById('lCertPlace').innerText = cPlace;
            document.getElementById('lExpiryDate').innerText = cExpiryDate;
            document.getElementById('lName').innerText = cName;
            document.getElementById('lIdNo').innerText = cIdNo;
            document.getElementById('lGender').innerText = cGender;
            document.getElementById('lNat').innerText = cNat;
            document.getElementById('lJob').innerText = cJob;

            const headerFile = document.getElementById('inHeaderImg').files[0];
            const userFile = document.getElementById('inUserImg').files[0];

            if(headerFile && userFile) {
                const readerH = new FileReader();
                readerH.onload = function(eH) {
                    const hSrc = eH.target.result;
                    document.getElementById('outHeaderImg1').src = hSrc;

                    const readerU = new FileReader();
                    readerU.onload = function(eU) {
                        const uSrc = eU.target.result;
                        document.getElementById('outUserImg1').src = uSrc;

                        document.getElementById("outQrImg").innerHTML = "";
                        
                        // ضغط وتمرير البيانات النصية فقط بالرابط حتى يظل الباركود واسع المربعات ومطابق للصورة الأولى
                        const minimalData = { cNo, cPlace, cExpiryDate, cName, cIdNo, cGender, cNat, cJob };
                        const stringified = btoa(unescape(encodeURIComponent(JSON.stringify(minimalData))));
                        const liveTrackingUrl = window.location.origin + window.location.pathname + "?v=" + stringified;
                        
                        new QRCode(document.getElementById("outQrImg"), { 
                            text: liveTrackingUrl, 
                            width: 110, height: 110, 
                            correctLevel: QRCode.CorrectLevel.M 
                        });

                        document.getElementById('inputFormContainer').style.display = 'none';
                        document.getElementById('previewWrapper').style.display = 'block';
                        document.getElementById('controlPanel').style.display = 'block';
                    }
                    readerU.readAsDataURL(userFile);
                }
                readerH.readAsDataURL(headerFile);
            }
        }

        async function buildAbsolutePDF() {
            const btn = document.getElementById('btnPdfSave');
            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [116, 166] });
            const p1 = document.getElementById('page1');

            const opts = { scale: 4, useCORS: true, logging: false, backgroundColor: '#ffffff' };

            try {
                const c1 = await html2canvas(p1, opts); 
                pdf.addImage(c1.toDataURL('image/png'), 'PNG', 0, 0, 116, 166);
                pdf.save('Health_Certificate_' + document.getElementById('cNo').value + '.pdf');
            } catch (err) { 
                alert('حدث خطأ في استخراج الـ PDF.'); 
            } finally {
                btn.innerText = "حفظ وتحميل الـ PDF النهائي";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
